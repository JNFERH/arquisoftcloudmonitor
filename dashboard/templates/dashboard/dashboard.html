<!DOCTYPE html>
<html>
<head>
    <title>{{ org.name }} — Cloud Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #F0F8FA;
            color: #022B51;
        }

        nav {
            background: #022B51;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 8px rgba(2,43,81,0.15);
        }

        .nav-brand {
            color: #FBFDFD;
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .nav-links { display: flex; gap: 8px; align-items: center; }

        .nav-links a {
            color: #F0F8FA;
            text-decoration: none;
            font-size: 0.88em;
            padding: 7px 16px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .nav-links a:hover { background: #136D90; }

        .nav-links a.btn-outline {
            border: 1.5px solid #758693;
            color: #F0F8FA;
        }

        .nav-links a.btn-outline:hover {
            border-color: #FBFDFD;
            background: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .messages { margin-bottom: 20px; }
        .messages p {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: #FBFDFD;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(2,43,81,0.07);
            border-top: 4px solid #136D90;
        }

        .summary-card h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #758693;
            margin-bottom: 10px;
        }

        .summary-card p {
            font-size: 1.9em;
            font-weight: 700;
            color: #022B51;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .chart-card {
            background: #FBFDFD;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(2,43,81,0.07);
        }

        .chart-card h3 {
            font-size: 0.88em;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #758693;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #F0F8FA;
        }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <span class="nav-brand">☁️ {{ org.name }}</span>
    <div class="nav-links">
        {% if is_admin %}
        <a href="{% url 'upload_json' %}">Upload JSON</a>
        {% endif %}
        <a href="{% url 'generate_report' %}">Generate Report</a>
        <a href="{% url 'logout' %}" class="btn-outline">Logout</a>
    </div>
</nav>

<div class="container">

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <div class="summary">
        <div class="summary-card">
            <h3>Total Cost</h3>
            <p>${{ total_cost }} <span style="font-size:0.5em; color:#758693;">USD</span></p>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>Cost by Service Type</h3>
            <canvas id="serviceChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Cost Over Time</h3>
            <canvas id="dateChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Cost by Resource Group</h3>
            <canvas id="resourceChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Cost by Region</h3>
            <canvas id="regionChart"></canvas>
        </div>
    </div>

</div>

<script>
    const byService = {{ by_service|safe }};
    const byDate = {{ by_date|safe }};
    const byResource = {{ by_resource_group|safe }};
    const byRegion = {{ by_region|safe }};

    const colors = ['#022B51','#136D90','#758693','#4a9bb5','#2d6a8a','#8faab8','#1a4f72','#5b8fa8','#3c7d9e','#a0bfcc'];

    new Chart(document.getElementById('serviceChart'), {
        type: 'bar',
        data: {
            labels: byService.map(x => x.label),
            datasets: [{ data: byService.map(x => x.value), backgroundColor: colors }]
        },
        options: { plugins: { legend: { display: false } }, responsive: true }
    });

    new Chart(document.getElementById('dateChart'), {
        type: 'line',
        data: {
            labels: byDate.map(x => x.label),
            datasets: [{
                data: byDate.map(x => x.value),
                borderColor: '#136D90',
                fill: true,
                backgroundColor: 'rgba(19,109,144,0.1)',
                tension: 0.3,
                pointRadius: 2
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            responsive: true,
            scales: {
                x: { ticks: { maxTicksLimit: 8, maxRotation: 30 } }
            }
        }
    });

    new Chart(document.getElementById('resourceChart'), {
        type: 'bar',
        data: {
            labels: byResource.map(x => x.label),
            datasets: [{ data: byResource.map(x => x.value), backgroundColor: colors }]
        },
        options: { plugins: { legend: { display: false } }, responsive: true, indexAxis: 'y' }
    });

    new Chart(document.getElementById('regionChart'), {
        type: 'pie',
        data: {
            labels: byRegion.map(x => x.label),
            datasets: [{ data: byRegion.map(x => x.value), backgroundColor: colors }]
        },
        options: { responsive: true }
    });
</script>

</body>
</html>
